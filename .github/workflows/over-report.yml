name: Overall Performance Report

on:
  schedule:
    - cron: "30 5 * * *"   # 11:00 AM IST roz
  workflow_dispatch:        # manual run button (testing ke liye)

jobs:
  run-report:
    runs-on: ubuntu-latest
    timeout-minutes: 20      # ek run 20 min se zyada atka to band (safety)

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Overall Performance Report (auto-retry on failure)
        uses: nick-fields/retry@v3
        env:
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_NAME: ${{ secrets.DB_NAME }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_PORT: ${{ secrets.DB_PORT }}
          GCP_CREDENTIALS: ${{ secrets.GCP_CREDENTIALS }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        with:
          timeout_minutes: 8        # ek koshish ki max time
          max_attempts: 5           # 5 baar tak try karega
          retry_wait_seconds: 120   # har fail ke baad 2 min ruk ke
          command: python Over_Performance_Report.py